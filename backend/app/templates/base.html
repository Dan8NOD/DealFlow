<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Leasing & Sales NOD{% endblock %}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #f7f9fc; color: #1a202c; line-height: 1.5; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }
  .btn { display: inline-block; padding: 10px 20px; background: #1f4e78; color: white;
    text-decoration: none; border-radius: 8px; font-weight: 600; border: none; cursor: pointer; }
  .btn:hover { background: #2c5f8a; }
  input { padding: 10px 14px; border: 1px solid #cbd5e0; border-radius: 8px;
    font-size: 14px; width: 100%; margin: 4px 0 12px; }
  form { max-width: 360px; margin: 40px auto; }
  {% block extra_css %}{% endblock %}
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
