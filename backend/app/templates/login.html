{% extends "base.html" %}
{% block title %}Sign In — Renter Portal{% endblock %}
{% block body %}
<div style="background: linear-gradient(135deg, #1f4e78 0%, #2c5f8a 100%); padding: 40px 24px; text-align: center;">
  <h1 style="color: white; font-size: 28px;">Renter Portal</h1>
</div>
<div class="container">
  <form method="post" action="/auth/login">
    <h2 style="text-align: center; margin-bottom: 24px;">Sign in</h2>
    <label>Email</label>
    <input type="email" name="email" required autofocus>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit" class="btn" style="width: 100%; margin-top: 8px;">Sign In</button>
    <p style="text-align: center; margin-top: 16px; color: #4a5568;">
      New here? <a href="/signup" style="color: #1f4e78;">Create account</a>
    </p>
  </form>
</div>
{% endblock %}
