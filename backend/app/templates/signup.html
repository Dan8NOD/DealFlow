{% extends "base.html" %}
{% block title %}Create Account — NOD Academy{% endblock %}
{% block body %}
<div style="background: linear-gradient(135deg, #0d1117 0%, #161b22 100%); padding: 40px 24px; text-align: center;">
  <h1 style="color: #d4a853; font-size: 28px;">NOD Academy</h1>
</div>
<div class="container">
  <form method="post" action="/auth/signup">
    <h2 style="text-align: center; margin-bottom: 24px; color: #d4a853;">Start free</h2>
    <label>Full name</label>
    <input type="text" name="full_name" placeholder="Jane Smith">
    <label>Email</label>
    <input type="email" name="email" required>
    <label>Organization name</label>
    <input type="text" name="org_name" placeholder="NOD Academy" required>
    <label>Password (8+ characters)</label>
    <input type="password" name="password" required minlength="8">
    <button type="submit" class="btn" style="width: 100%; margin-top: 8px; background: #d4a853; color: #0d1117; font-weight: 600;">Create Account</button>
    <p style="text-align: center; margin-top: 16px; color: #8b949e;">
      Already have one? <a href="/login" style="color: #d4a853;">Sign in</a>
    </p>
  </form>
</div>
{% endblock %}
